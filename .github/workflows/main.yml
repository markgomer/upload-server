name: widget-server pipe

on:
  push:
    branches:
      - 'master'

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          # INFO: grab the keys on AWS (security >> access keys);
          # put them as Repository secrets on GH
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }} 
 
      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to AWS ECR
        id: build-push-image
        run: |
          docker build -t widget-server:v2
          docker tag widget-server:v2 533003975847.dkr.ecr.us-east-2.amazonaws.com/rocketseat/widget-server:v3
          docker push 533003975847.dkr.ecr.us-east-2.amazonaws.com/rocketseat/widget-server:v3


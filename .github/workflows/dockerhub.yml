name: widget-server pipe DockerHub

on:
  push:
    branches:
      - 'master'

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate tag
        id: generate-tag
        # $GITHUB_OUTPUT here will be available as "steps.generate-tag.outputs"
        # while the "sha" variable, as steps.generate-tag.outputs.sha
        # $GITHUB_SHA is the commit SHA
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Build and push image to DockerHub
        id: build-push-image
        env:
          # We must register this on Github repo variables
          DOCKER_REPOSITORY: ${{ vars.DOCKER_REPOSITORY }}
          IMAGE_TAG: ${{ steps.generate-tag.outputs.sha }}
        run: |
          docker build -t $DOCKER_REPOSITORY:$IMAGE_TAG .
          docker push $DOCKER_REPOSITORY:$IMAGE_TAG
